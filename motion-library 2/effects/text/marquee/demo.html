<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>marquee demo</title>
<link rel="stylesheet" href="vanilla.css" />
<style>
  body{ margin:0; background:#0d0d0d; color:#8a8a82; font-family:ui-monospace,monospace; }
  .pad{ height:30vh; }
  .mq__inner span{ font-size:clamp(34px,8vw,90px); font-weight:700; letter-spacing:-.03em;
    color:transparent; -webkit-text-stroke:1px #f4f1ea; }
  .mq__inner span.fill{ color:#f4f1ea; -webkit-text-stroke:0; }
  .cap{ font-size:11px; padding:14px 18px; }
</style>
</head>
<body>
  <div class="cap">drifts on its own · scroll the frame to make it surge</div>
  <div class="mq" aria-hidden="true">
    <div class="mq__inner">
      <span>Creative Direction</span><span class="fill">▲</span><span>Brand</span><span class="fill">▲</span><span>Interactive</span><span class="fill">▲</span>
      <span>Creative Direction</span><span class="fill">▲</span><span>Brand</span><span class="fill">▲</span><span>Interactive</span><span class="fill">▲</span>
    </div>
  </div>
  <div class="pad"></div>
  <script src="vanilla.js"></script>
</body>
</html>
