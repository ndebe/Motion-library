<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>smooth-scroll demo</title>
<style>
  body{ margin:0; background:#0d0d0d; color:#f4f1ea; font-family:ui-monospace,monospace; }
  #smooth-content{ padding:24px; }
  .block{ height:42vh; margin:14px 0; border-radius:8px; display:grid; place-items:center;
    background:#161616; color:#8a8a82; font-size:13px; }
  .cap{ font-size:11px; color:#8a8a82; }
</style>
</head>
<body>
  <div id="smooth-content">
    <div class="cap">scroll inside this frame — note the eased, weighted motion</div>
    <div class="block">section 1</div>
    <div class="block">section 2</div>
    <div class="block">section 3</div>
    <div class="block">section 4</div>
  </div>
  <script src="vanilla.js"></script>
</body>
</html>
