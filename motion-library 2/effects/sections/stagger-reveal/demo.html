<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stagger-reveal demo</title>
<link rel="stylesheet" href="vanilla.css" />
<style>
  body{ margin:0; background:#0d0d0d; color:#8a8a82; font-family:ui-monospace,monospace; padding:24px; }
  .cap{ font-size:11px; margin-bottom:18px; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .card{ height:130px; background:#1a1a1a; border-radius:8px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
  <div class="cap">cards rise + fade in, staggered by --d</div>
  <div class="grid">
    <div class="card" data-reveal style="--d:0s"></div>
    <div class="card" data-reveal style="--d:.08s"></div>
    <div class="card" data-reveal style="--d:.16s"></div>
    <div class="card" data-reveal style="--d:.24s"></div>
    <div class="card" data-reveal style="--d:.32s"></div>
    <div class="card" data-reveal style="--d:.40s"></div>
    <div class="card" data-reveal style="--d:.48s"></div>
    <div class="card" data-reveal style="--d:.56s"></div>
  </div>
  <script src="vanilla.js"></script>
</body>
</html>
