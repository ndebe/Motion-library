<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>clip-path-wipe demo</title>
<link rel="stylesheet" href="vanilla.css" />
<style>
  body{ margin:0; background:#0d0d0d; font-family:ui-monospace,monospace; color:#8a8a82; }
  .stage{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:18px; }
  .media{ aspect-ratio:16/10; border-radius:6px; overflow:hidden; background:#181818; }
  .media img{ width:100%; height:100%; object-fit:cover; display:block; }
  .bar{ padding:12px 18px; }
  button{ font:inherit; font-size:12px; letter-spacing:.06em; color:#0d0d0d; background:#f4f1ea;
    border:0; border-radius:100px; padding:9px 16px; cursor:pointer; }
  button:hover{ background:#ff4d2e; color:#fff; }
  .cap{ font-size:11px; padding:0 18px 14px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="media"><img class="cw-reveal" data-dir="left"  src="https://picsum.photos/seed/cwL/800/500" alt=""></div>
    <div class="media"><img class="cw-reveal" data-dir="down"  src="https://picsum.photos/seed/cwD/800/500" alt=""></div>
    <div class="media"><img class="cw-reveal" data-dir="left"  src="https://picsum.photos/seed/cwL2/800/500" alt=""></div>
    <div class="media"><img class="cw-reveal" data-dir="right" src="https://picsum.photos/seed/cwR/800/500" alt=""></div>
  </div>
  <div class="cap">left · down · left · right — clip-path polygon grows from an edge</div>
  <div class="bar"><button onclick="cwReplayAll()">▶ Replay</button></div>

  <script src="vanilla.js"></script>
  <script>
    // auto-play once so motion is visible in the gallery iframe
    addEventListener('load', () => setTimeout(() => window.cwReplayAll && cwReplayAll(), 300));
  </script>
</body>
</html>
