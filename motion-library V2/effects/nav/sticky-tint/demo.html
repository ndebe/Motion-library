<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sticky-tint demo</title>
<link rel="stylesheet" href="vanilla.css" />
<style>
  body{ margin:0; background:#0d0d0d; font-family:ui-monospace,monospace; color:#8a8a82; }
  .st-nav{ font-size:12px; letter-spacing:.06em; color:#f4f1ea; }
  .hero{ height:80vh; display:grid; place-items:center; background:linear-gradient(#1a1a1a,#0d0d0d); color:#f4f1ea; }
  .rest{ height:120vh; padding:24px; }
  .cap{ position:fixed; bottom:10px; left:0; right:0; text-align:center; font-size:11px; }
</style>
</head>
<body>
  <nav class="st-nav"><span>HOUSE OF ▲</span><span>WORK · ABOUT</span></nav>
  <div class="hero">scroll ↓ — the bar tints</div>
  <div class="rest">…content…</div>
  <div class="cap">nav: transparent → tinted past 60% viewport scroll</div>
  <script src="vanilla.js"></script>
</body>
</html>
